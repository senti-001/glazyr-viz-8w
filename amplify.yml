version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install --legacy-peer-deps
        - env | grep -e "GITHUB_" -e "GOOGLE_" -e "REDIS_" -e "NEXTAUTH_" -e "STRIPE_" -e "NEXT_PUBLIC_" -e "DATABASE_URL" -e "DIRECT_URL" >> .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
